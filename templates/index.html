<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Watermark Tool</title>

    <!-- Bootstrap 5 -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg p-4 mx-auto" style="max-width: 500px;">
        <h2 class="text-center mb-4">Watermark Tool</h2>

        <div id="drop-area" class="border border-2 border-secondary rounded p-4 text-center bg-white">
            <p class="text-muted">Drag & Drop an image here</p>
            <input type="file" id="file-input" accept="image/*" class="form-control">
        </div>

        <img id="preview" class="img-fluid rounded mt-3 d-none">

        <input type="text" id="text-input" 
               class="form-control mt-3" 
               placeholder="Enter watermark text">
        
        <!-- Trust Warning Modal -->
<div class="modal fade" id="trustModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">Security Notice</h5>
      </div>
      <div class="modal-body">
        <p>This tool will download a watermarked image to your Downloads folder.</p>
        <p>Please continue only if you trust this site.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button id="confirm-btn" class="btn btn-primary">Continue</button>
      </div>
    </div>
  </div>
</div>


        <button id="apply-btn" class="btn btn-primary w-100 mt-4">
            Apply Watermark
        </button>
    </div>
</div>

<script src="/static/script.js"></script>
</body>

</html>
